name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: gates/gate3
        run: |
          pip install jaraco.text
          pip install -r requirements.txt

      - name: Build with PyInstaller
        working-directory: gates/gate3
        run: |
          pyinstaller --noconfirm `
            --onedir `
            --name AirTrack `
            --paths "../.." `
            --paths "../../app" `
            --add-data "../../app/templates;app/templates" `
            --add-data "../../app/static;app/static" `
            --add-data "../../app/migrations;app/migrations" `
            --add-data "../../app/db;app/db" `
            --add-data "../../app/scripts/airports.csv;app/scripts" `
            --add-data "../../app/core;app/core" `
            --hidden-import win32timezone `
            --hidden-import win32service `
            --hidden-import win32serviceutil `
            --hidden-import win32event `
            --hidden-import servicemanager `
            --hidden-import pywintypes `
            --hidden-import waitress `
            --hidden-import pymysql `
            --hidden-import flask `
            --hidden-import werkzeug `
            --hidden-import sqlalchemy `
            --hidden-import flask_sqlalchemy `
            --hidden-import flask_wtf `
            --hidden-import pytz `
            --hidden-import cryptography `
            --hidden-import webauthn `
            --hidden-import apscheduler `
            --hidden-import stripe `
            --hidden-import paramiko `
            --hidden-import app.app `
            --hidden-import version `
            --hidden-import extensions `
            --hidden-import routes `
            --collect-data jaraco `
            --distpath dist `
            --workpath build `
            --specpath . `
            service.py

      - name: Copy schema.sql into gate3
        run: Copy-Item "app\db\schema.sql" "gates\gate3\schema.sql" -Force

      - name: Cache MariaDB MSI
        uses: actions/cache@v4
        id: cache-mariadb
        with:
          path: gates/gate3/mariadb-11.4.12-winx64.msi
          key: mariadb-11.4.12-winx64

      - name: Download MariaDB MSI
        if: steps.cache-mariadb.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest `
            -Uri "https://downloads.mariadb.com/MariaDB/mariadb-11.4.12/winx64-packages/mariadb-11.4.12-winx64.msi" `
            -OutFile "gates\gate3\mariadb-11.4.12-winx64.msi" `
            -UseBasicParsing

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        working-directory: gates/gate3
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirTrack-installer
          path: gates/gate3/Output/AirTrackSetup.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: gates/gate3/Output/AirTrackSetup.exe
          name: AirTrack ${{ github.ref_name }}
