<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aircraft Info Help</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/aircraft_info.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/aircraft_info_help.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v={{ cache_bust }}">
    <script src="{{ url_for('static', filename='js/jquery-3.7.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
</head>

<body class="theme-{{ selected_theme }}">
  <div class="background"></div>
  {% include 'header.html' %}

    <h2 class="aircraft-title">Aircraft Information</h2> <!-- ✅ Title moved and styled -->

    <main class="aircraft-info-container">
        <div class="aircraft-info-wrapper">
            <div class="header-card">
                <!-- Title is now outside this card, per your instructions -->
            </div>

            {% include 'aircraft_info_help_content.html' %}
           
        </div>
    </main>

    <div class="aircraft-back-link">
        <a href="{{ url_for('aircraft.aircraft_info', aircraft_id=aircraft_id) }}" class="teal-button">Back to Aircraft Info</a>
    </div>
    
    {% include 'footer.html' %}
<script src="{{ url_for('static', filename='js/theme_loader.js') }}"></script>
</body>
</html>
