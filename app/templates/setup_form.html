<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup AirTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v={{ cache_bust }}">
</head>
<body class="theme-{{ selected_theme }}">
  <div class="background"></div>
  {% include 'header.html' %}

    <div class="container mt-5">
        <h1 class="text-center mb-4">Welcome to AirTrack Setup</h1>
        <p class="text-center">Please provide your full name and callsign to get started.</p>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <form action="/" method="POST">
                    <div class="mb-3">
                        <label for="first_name" class="form-label">First Name:</label>
                        <input type="text" class="form-control" id="first_name" name="first_name" required>
                    </div>

                    <div class="mb-3">
                        <label for="last_name" class="form-label">Last Name:</label>
                        <input type="text" class="form-control" id="last_name" name="last_name" required>
                    </div>

                    <div class="mb-3">
                        <label for="callsign" class="form-label">Callsign:</label>
                        <input type="text" class="form-control" id="callsign" name="callsign" maxlength="12" placeholder="Optional">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Next</button>
                </form>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div class="mt-3">
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
            </div>
        </div>
    </div>

<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme_loader.js') }}"></script>
</body>
</html>
