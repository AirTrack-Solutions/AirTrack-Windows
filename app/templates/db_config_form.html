<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Configuration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v={{ cache_bust }}">
</head>
<body class="theme-{{ selected_theme }}">
  <div class="background"></div>
  {% include 'header.html' %}
    <h1>Database Configuration</h1>
    <p>Enter your database credentials to proceed.</p>

    <form action="/db_config" method="POST">
        <label for="db_user">Database Username:</label>
        <input type="text" id="db_user" name="db_user" required>

        <label for="db_password">Database Password:</label>
        <input type="password" id="db_password" name="db_password" required>

        <label for="db_root_password">Database Root Password:</label>
        <input type="password" id="db_root_password" name="db_root_password" required>

        <button type="submit">Next</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul>
                {% for category, message in messages %}
                    <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
<script src="{{ url_for('static', filename='js/theme_loader.js') }}"></script>
</body>
</html>
