<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v={{ cache_bust }}">
</head>
<body class="theme-{{ selected_theme }}">
  <div class="background"></div>
  {% include 'header.html' %}
    <div class="container mt-5">
        <h2 class="text-danger">Error</h2>
        <p>{{ error_message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">Go Back</a>
    </div>
<script src="{{ url_for('static', filename='js/theme_loader.js') }}"></script>
</body>
</html>
