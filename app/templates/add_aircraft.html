<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Aircraft</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_aircraft.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v={{ cache_bust }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="theme-{{ selected_theme }}">
    <div class="background"></div>
    {% include 'header.html' %}
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div id="flashes">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    <div class="container mt-4">
        <h2>Add New Aircraft</h2>
        <form method="POST" action="{{ url_for('add_aircraft.add_aircraft') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- Registration Row -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Registration</label>
                    <div class="d-flex align-items-center gap-3">
                        <input type="text" name="Registration" id="reg-input" class="form-control uppercase-input" required value="{{ registration or request.form.get('Registration', '') }}">
                        <button type="button" class="btn btn-success" id="btn-lookup">Lookup</button>
                    </div>
                    <div id="lookup-status" class="mt-1 small text-muted" style="min-height:1.2em;"></div>
                </div>
                <div class="col-md-4">
                    <label>Flight Number</label>
                    <input type="text" name="FlightNumber" class="form-control uppercase-input" value="{{ request.form.get('FlightNumber', '') }}">
                </div>
                <div class="col-md-4">
                    <label>Aircraft Type <img src="/static/images/shield.png" id="shield-Aircraft_Type" style="display:none;height:1.5em;width:auto;vertical-align:middle;" title="Suggested from registry"></label>
                    <input type="text" name="Aircraft_Type" class="form-control" required value="{{ request.form.get('Aircraft_Type', '') }}">
                </div>
            </div>

            <!-- Airline Row -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>MSN <img src="/static/images/shield.png" id="shield-MSN" style="display:none;height:1.5em;width:auto;vertical-align:middle;" title="Suggested from registry"></label>
                    <input type="text" name="MSN" class="form-control" value="{{ request.form.get('MSN', '') }}">
                </div>
                <div class="col-md-4">
                    <label>Airline <img src="/static/images/shield.png" id="shield-Airline" style="display:none;height:1.5em;width:auto;vertical-align:middle;" title="Suggested from registry"></label>
                    <select name="AirlineID" class="form-control">
                        <option value="">— Select an airline —</option>
                        {% for airline in airlines %}
                            <option value="{{ airline.AirlineID }}"
                                {% if request.form.get('AirlineID') == airline.AirlineID|string or selected_airline_id|string == airline.AirlineID|string %}selected{% endif %}>
                                {{ airline.AirlineName }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label>Spotted At</label>
                    <input type="text" name="Spotted_At" class="form-control" placeholder="e.g. Airport, Radar, Callsign, Spotter Name" value="{{ request.form.get('Spotted_At', '') }}">
                </div>
            </div>

            <!-- Category / Country -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Category</label>
                    <input type="text" name="Category" class="form-control" value="{{ request.form.get('Category', '') }}">
                </div>
                <div class="col-md-6">
                    <label>Country of Registration <img src="/static/images/shield.png" id="shield-Country_of_Reg" style="display:none;height:1.5em;width:auto;vertical-align:middle;" title="Suggested from registry"></label>
                    <input type="text" name="Country_of_Reg" class="form-control" value="{{ request.form.get('Country_of_Reg', '') }}">
                </div>
            </div>

            <!-- Manufacture / ICAO -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Manufacture Year <img src="/static/images/shield.png" id="shield-Manufacture_Year" style="display:none;height:1.5em;width:auto;vertical-align:middle;" title="Suggested from registry"></label>
                    <input type="number" name="Manufacture_Year" class="form-control" value="{{ request.form.get('Manufacture_Year', '') }}">
                </div>
                <div class="col-md-4">
                    <label for="Manufacture_Month">Manufacture Month:</label>
                    <select name="Manufacture_Month" id="Manufacture_Month" class="form-control">
                        {% set months = ['Not Given','January','February','March','April','May','June','July','August','September','October','November','December'] %}
                        {% for name in months %}
                            <option value="{{ loop.index0 }}" {% if request.form.get('Manufacture_Month','0')|int == loop.index0 %}selected{% endif %}>
                                {{ name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label>ICAO Hex Code <img src="/static/images/shield.png" id="shield-ICAO_Address" style="display:none;height:1.5em;width:auto;vertical-align:middle;" title="Suggested from registry"></label>
                    <input type="text" name="ICAO_Address" class="form-control uppercase-input" value="{{ request.form.get('ICAO_Address', '') }}">
                </div>
            </div>

            <!-- Departure / Arrival -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Departure</label>
                    <div class="airport-autocomplete">
                        <input type="text" name="Departure_display" id="departure-input" class="form-control airport-input"
                            value="{{ request.form.get('Departure') | airport if request.form.get('Departure') else '' }}"
                            placeholder="e.g. YSSY or Sydney" autocomplete="off">
                        <input type="hidden" name="Departure" id="departure-hidden" value="{{ request.form.get('Departure', '') }}">
                        <div class="airport-suggestions" id="departure-suggestions"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <label>Arrival</label>
                    <div class="airport-autocomplete">
                        <input type="text" name="Arrival_display" id="arrival-input" class="form-control airport-input"
                            value="{{ request.form.get('Arrival') | airport if request.form.get('Arrival') else '' }}"
                            placeholder="e.g. YMML or Melbourne" autocomplete="off">
                        <input type="hidden" name="Arrival" id="arrival-hidden" value="{{ request.form.get('Arrival', '') }}">
                        <div class="airport-suggestions" id="arrival-suggestions"></div>
                    </div>
                </div>
            </div>

            <input type="hidden" name="registration" value="{{ registration }}">

            <!-- Sighting Date / Time -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Sighting Date</label>
                    <div class="d-flex align-items-center gap-3">
                        <input type="date" name="Sighting_Date" id="sighting-date" class="form-control">
                        <button type="button" class="btn btn-success" id="btn-today">Today</button>
                    </div>
                </div>
                <div class="col-md-6">
                    <label>Sighting Time <small class="text-muted">(optional)</small></label>
                    <div class="d-flex align-items-center gap-3">
                        <input type="time" name="Sighting_Time" id="sighting-time" class="form-control">
                        <button type="button" class="btn btn-success" id="btn-now">Now</button>
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="mb-3 mt-4">
                <label>Notes</label>
                <textarea name="Notes" class="form-control" rows="3">{{ request.form.get('Notes', '') }}</textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('aircraft.aircraft_table') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-success">Add Aircraft</button>
            </div>
        </form>
    </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{{ url_for('static', filename='js/theme_loader.js') }}"></script>

<script>
/* (All autocomplete JS preserved exactly as-is) */
$(document).ready(function() {
    let currentIndex = -1;
    let currentInput = null;

    $('.airport-input').on('input', function() {
        const input = $(this);
        currentInput = input;
        const query = input.val().trim();
        const suggestionsDiv = input.siblings('.airport-suggestions');
        currentIndex = -1;

        if (query.length < 1) {
            suggestionsDiv.hide();
            return;
        }

        $.get('/airports/search', { q: query })
        .done(function(airports) {
            suggestionsDiv.empty();

            airports.forEach(airport => {
                const suggestion = $('<div class="airport-suggestion" data-icao="' + airport.ICAO + '" data-display="' + airport.display_name + '"><div class="airport-name">' + airport.display_name + '</div></div>');

                suggestion.on('click', function() {
                    input.val($(this).data('display'));
                    if (input.attr('id') === 'departure-input') {
                        $('#departure-hidden').val($(this).data('icao'));
                    } else if (input.attr('id') === 'arrival-input') {
                        $('#arrival-hidden').val($(this).data('icao'));
                    }
                    suggestionsDiv.hide();
                });

                suggestionsDiv.append(suggestion);
            });

            suggestionsDiv.show();
        });
    });

    $('.airport-input').on('keydown', function(e) {
        const input = $(this);
        const suggestionsDiv = input.siblings('.airport-suggestions');
        const suggestions = suggestionsDiv.find('.airport-suggestion');

        if (suggestions.length === 0) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            currentIndex++;
            if (currentIndex >= suggestions.length) currentIndex = 0;
            updateHighlight(suggestions);
        }
        else if (e.key === 'ArrowUp') {
            e.preventDefault();
            currentIndex--;
            if (currentIndex < 0) currentIndex = suggestions.length - 1;
            updateHighlight(suggestions);
        }
        else if (e.key === 'Enter') {
            e.preventDefault();
            if (currentIndex >= 0) {
                const selected = $(suggestions[currentIndex]);
                input.val(selected.data('display'));
                if (input.attr('id') === 'departure-input') {
                    $('#departure-hidden').val(selected.data('icao'));
                } else if (input.attr('id') === 'arrival-input') {
                    $('#arrival-hidden').val(selected.data('icao'));
                }
                suggestionsDiv.hide();
                currentIndex = -1;
            }
        }
        else if (e.key === 'Escape') {
            suggestionsDiv.hide();
            currentIndex = -1;
        }
    });

    function updateHighlight(suggestions) {
        suggestions.removeClass('selected');
        if (currentIndex >= 0) {
            $(suggestions[currentIndex]).addClass('selected');
        }
    }

    $(document).on('click', function(e) {
        if (!$(e.target).closest('.airport-autocomplete').length) {
            $('.airport-suggestions').hide();
            currentIndex = -1;
        }
    });

    // Clear 'None' placeholders
    if ($('#departure-hidden').val().toLowerCase() === 'none') {
        $('#departure-input').val('');
        $('#departure-hidden').val('');
    }
    if ($('#arrival-hidden').val().toLowerCase() === 'none') {
        $('#arrival-input').val('');
        $('#arrival-hidden').val('');
    }

    // Fallback before submit
    $('form').on('submit', function() {
        if (!$('#departure-hidden').val()) {
            $('#departure-hidden').val($('#departure-input').val().trim());
        }
        if (!$('#arrival-hidden').val()) {
            $('#arrival-hidden').val($('#arrival-input').val().trim());
        }
    });
});
</script>


<script>
document.getElementById('btn-today').addEventListener('click', function() {
    var d = new Date();
    var yyyy = d.getFullYear();
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    document.getElementById('sighting-date').value = yyyy + '-' + mm + '-' + dd;
});
document.getElementById('btn-now').addEventListener('click', function() {
    var d = new Date();
    var hh = String(d.getHours()).padStart(2, '0');
    var mi = String(d.getMinutes()).padStart(2, '0');
    document.getElementById('sighting-time').value = hh + ':' + mi;
});
</script>

<script>
(function() {
    const regInput = document.getElementById('reg-input');
    const statusBox = document.getElementById('lookup-status');
    const lookupBtn = document.getElementById('btn-lookup');

    // Simple text field map: registry key -> { inputName, shieldId }
    const fieldMap = {
        aircraftmodel:   { name: 'Aircraft_Type',   shield: 'shield-Aircraft_Type' },
        msn:             { name: 'MSN',              shield: 'shield-MSN' },
        operatorcountry: { name: 'Country_of_Reg',  shield: 'shield-Country_of_Reg' },
        yearmanu:        { name: 'Manufacture_Year', shield: 'shield-Manufacture_Year' },
        hexcode:         { name: 'ICAO_Address',     shield: 'shield-ICAO_Address' },
    };

    function clearShields() {
        Object.values(fieldMap).forEach(function(f) {
            var el = document.getElementById(f.shield);
            if (el) el.style.display = 'none';
        });
        var airlineShield = document.getElementById('shield-Airline');
        if (airlineShield) airlineShield.style.display = 'none';
    }

    function setStatus(msg, colour) {
        statusBox.textContent = msg;
        statusBox.style.color = colour || '';
    }

    function tryMatchAirline(operatorName) {
        if (!operatorName) return;
        const select = document.querySelector('[name="AirlineID"]');
        const shield = document.getElementById('shield-Airline');
        if (!select) return;
        const needle = operatorName.trim().toLowerCase();
        for (let i = 0; i < select.options.length; i++) {
            if (select.options[i].text.trim().toLowerCase() === needle) {
                select.value = select.options[i].value;
                if (shield) shield.style.display = 'inline';
                select.addEventListener('change', function once() {
                    if (shield) shield.style.display = 'none';
                    select.removeEventListener('change', once);
                });
                return;
            }
        }
    }

    async function doLookup() {
        const reg = (regInput.value || '').trim().toUpperCase();
        if (!reg) { clearShields(); setStatus(''); return; }

        setStatus('Looking up…', '#888');
        clearShields();

        try {
            const resp = await fetch('/admin/manual-aircraft/lookup?registration=' + encodeURIComponent(reg));
            const payload = await resp.json();

            if (!payload.ok) { setStatus('Lookup failed.', 'red'); return; }

            if (!payload.found) {
                setStatus('Not found in registry.', '#888');
                return;
            }

            const data = payload.data || {};
            let filled = 0;

            Object.entries(fieldMap).forEach(function([regKey, f]) {
                const val = data[regKey];
                const input = document.querySelector('[name="' + f.name + '"]');
                const shield = document.getElementById(f.shield);
                if (input && val) {
                    input.value = val;
                    if (shield) shield.style.display = 'inline';
                    filled++;
                    input.addEventListener('input', function once() {
                        if (shield) shield.style.display = 'none';
                        input.removeEventListener('input', once);
                    });
                }
            });

            tryMatchAirline(data.operatorname);
            if (document.getElementById('shield-Airline').style.display !== 'none') filled++;

            setStatus('Registry match — ' + filled + ' field' + (filled !== 1 ? 's' : '') + ' suggested.', 'green');

        } catch(err) {
            setStatus('Lookup error.', 'red');
        }
    }

    lookupBtn.addEventListener('click', doLookup);
    regInput.addEventListener('blur', doLookup);
})();
</script>
{% include 'footer.html' %}
</body>
</html>
