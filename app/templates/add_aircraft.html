<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Aircraft</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_aircraft.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v={{ cache_bust }}">
</head>
<body class="theme-{{ selected_theme }}">
    <div class="background"></div>
    {% include 'header.html' %}
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div id="flashes">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    <div class="container mt-4">
        <h2>Add New Aircraft</h2>
        <form method="POST" action="{{ url_for('add_aircraft.add_aircraft') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- Registration Row -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Registration</label>
                    <input type="text" name="Registration" class="form-control uppercase-input" required value="{{ registration or request.form.get('Registration', '') }}">
                </div>
                <div class="col-md-4">
                    <label>Flight Number</label>
                    <input type="text" name="FlightNumber" class="form-control uppercase-input" required value="{{ request.form.get('FlightNumber', '') }}">
                </div>
                <div class="col-md-4">
                    <label>Aircraft Type</label>
                    <input type="text" name="Aircraft_Type" class="form-control" required value="{{ request.form.get('Aircraft_Type', '') }}">
                </div>
            </div>

            <!-- Airline Row -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>MSN</label>
                    <input type="text" name="MSN" class="form-control" value="{{ request.form.get('MSN', '') }}">
                </div>
                <div class="col-md-4">
                    <label>Airline</label>
                    <select name="AirlineID" class="form-control">
                        <option value="">— Select an airline —</option>
                        {% for airline in airlines %}
                            <option value="{{ airline.AirlineID }}"
                                {% if request.form.get('AirlineID') == airline.AirlineID|string or selected_airline_id|string == airline.AirlineID|string %}selected{% endif %}>
                                {{ airline.AirlineName }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label>Spotted At</label>
                    <input type="text" name="Spotted_At" class="form-control" placeholder="e.g. Airport, Radar, Callsign, Spotter Name" value="{{ request.form.get('Spotted_At', '') }}">
                </div>
            </div>

            <!-- Category / Country / Times Seen -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Category</label>
                    <input type="text" name="Category" class="form-control" value="{{ request.form.get('Category', '') }}">
                </div>
                <div class="col-md-4">
                    <label>Country of Registration</label>
                    <input type="text" name="Country_of_Reg" class="form-control" value="{{ request.form.get('Country_of_Reg', '') }}">
                </div>
                <div class="col-md-4">
                    <label>Times Seen</label>
                    <input type="number" name="Times_Seen" class="form-control" value="{{ request.form.get('Times_Seen', '1') }}">
                </div>
            </div>

            <!-- Manufacture / ICAO -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Manufacture Year</label>
                    <input type="number" name="Manufacture_Year" class="form-control" value="{{ request.form.get('Manufacture_Year', '') }}">
                </div>
                <div class="col-md-4">
                    <label for="Manufacture_Month">Manufacture Month:</label>
                    <select name="Manufacture_Month" id="Manufacture_Month" class="form-control">
                        {% set months = ['Not Given','January','February','March','April','May','June','July','August','September','October','November','December'] %}
                        {% for name in months %}
                            <option value="{{ loop.index0 }}" {% if request.form.get('Manufacture_Month','0')|int == loop.index0 %}selected{% endif %}>
                                {{ name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label>ICAO Address</label>
                    <input type="text" name="ICAO_Address" class="form-control uppercase-input" value="{{ request.form.get('ICAO_Address', '') }}">
                </div>
            </div>

            <!-- Departure / Arrival -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Departure</label>
                    <div class="airport-autocomplete">
                        <input type="text" name="Departure_display" id="departure-input" class="form-control airport-input"
                            value="{{ request.form.get('Departure') | airport if request.form.get('Departure') else '' }}"
                            placeholder="e.g. YSSY or Sydney" autocomplete="off">
                        <input type="hidden" name="Departure" id="departure-hidden" value="{{ request.form.get('Departure', '') }}">
                        <div class="airport-suggestions" id="departure-suggestions"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <label>Arrival</label>
                    <div class="airport-autocomplete">
                        <input type="text" name="Arrival_display" id="arrival-input" class="form-control airport-input"
                            value="{{ request.form.get('Arrival') | airport if request.form.get('Arrival') else '' }}"
                            placeholder="e.g. YMML or Melbourne" autocomplete="off">
                        <input type="hidden" name="Arrival" id="arrival-hidden" value="{{ request.form.get('Arrival', '') }}">
                        <div class="airport-suggestions" id="arrival-suggestions"></div>
                    </div>
                </div>
            </div>

            <input type="hidden" name="registration" value="{{ registration }}">

            <!-- Notes -->
            <div class="mb-3 mt-4">
                <label>Notes</label>
                <textarea name="Notes" class="form-control" rows="3">{{ request.form.get('Notes', '') }}</textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('aircraft.aircraft_table') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-success">Add Aircraft</button>
            </div>
        </form>
    </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{{ url_for('static', filename='js/theme_loader.js') }}"></script>

<script>
/* (All autocomplete JS preserved exactly as-is) */
$(document).ready(function() {
    let currentIndex = -1;
    let currentInput = null;

    $('.airport-input').on('input', function() {
        const input = $(this);
        currentInput = input;
        const query = input.val().trim();
        const suggestionsDiv = input.siblings('.airport-suggestions');
        currentIndex = -1;

        if (query.length < 1) {
            suggestionsDiv.hide();
            return;
        }

        $.get('/airports/search', { q: query })
        .done(function(airports) {
            suggestionsDiv.empty();

            airports.forEach(airport => {
                const suggestion = $('<div class="airport-suggestion" data-icao="' + airport.ICAO + '" data-display="' + airport.display_name + '"><div class="airport-name">' + airport.display_name + '</div></div>');

                suggestion.on('click', function() {
                    input.val($(this).data('display'));
                    if (input.attr('id') === 'departure-input') {
                        $('#departure-hidden').val($(this).data('icao'));
                    } else if (input.attr('id') === 'arrival-input') {
                        $('#arrival-hidden').val($(this).data('icao'));
                    }
                    suggestionsDiv.hide();
                });

                suggestionsDiv.append(suggestion);
            });

            suggestionsDiv.show();
        });
    });

    $('.airport-input').on('keydown', function(e) {
        const input = $(this);
        const suggestionsDiv = input.siblings('.airport-suggestions');
        const suggestions = suggestionsDiv.find('.airport-suggestion');

        if (suggestions.length === 0) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            currentIndex++;
            if (currentIndex >= suggestions.length) currentIndex = 0;
            updateHighlight(suggestions);
        }
        else if (e.key === 'ArrowUp') {
            e.preventDefault();
            currentIndex--;
            if (currentIndex < 0) currentIndex = suggestions.length - 1;
            updateHighlight(suggestions);
        }
        else if (e.key === 'Enter') {
            e.preventDefault();
            if (currentIndex >= 0) {
                const selected = $(suggestions[currentIndex]);
                input.val(selected.data('display'));
                if (input.attr('id') === 'departure-input') {
                    $('#departure-hidden').val(selected.data('icao'));
                } else if (input.attr('id') === 'arrival-input') {
                    $('#arrival-hidden').val(selected.data('icao'));
                }
                suggestionsDiv.hide();
                currentIndex = -1;
            }
        }
        else if (e.key === 'Escape') {
            suggestionsDiv.hide();
            currentIndex = -1;
        }
    });

    function updateHighlight(suggestions) {
        suggestions.removeClass('selected');
        if (currentIndex >= 0) {
            $(suggestions[currentIndex]).addClass('selected');
        }
    }

    $(document).on('click', function(e) {
        if (!$(e.target).closest('.airport-autocomplete').length) {
            $('.airport-suggestions').hide();
            currentIndex = -1;
        }
    });

    // Clear 'None' placeholders
    if ($('#departure-hidden').val().toLowerCase() === 'none') {
        $('#departure-input').val('');
        $('#departure-hidden').val('');
    }
    if ($('#arrival-hidden').val().toLowerCase() === 'none') {
        $('#arrival-input').val('');
        $('#arrival-hidden').val('');
    }

    // Fallback before submit
    $('form').on('submit', function() {
        if (!$('#departure-hidden').val()) {
            $('#departure-hidden').val($('#departure-input').val().trim());
        }
        if (!$('#arrival-hidden').val()) {
            $('#arrival-hidden').val($('#arrival-input').val().trim());
        }
    });
});
</script>

{% include 'footer.html' %}
</body>
</html>
