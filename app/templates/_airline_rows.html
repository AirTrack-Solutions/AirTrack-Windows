{% for airline in airlines %}
<tr>
  <td>{{ airline[1] }}</td>  <!-- Airline Name -->
  <td>{{ airline[2] }}</td>  <!-- Country -->
  <td>{{ airline[3] }}</td>  <!-- IATA -->
  <td>{{ airline[4] | airport if airline[4] else '—' }}</td>  <!-- ICAO -->
  <td>{{ airline[5] }}</td>  <!-- Callsign -->
  <td>
    <a href="{{ url_for('airlines.airline_info', airline_id=airline[0]) }}" class="btn btn-primary btn-sm">Info</a>
    <a href="{{ url_for('edit_airline', airline_id=airline[0]) }}" class="btn btn-warning btn-sm">Edit</a>
    <a href="{{ url_for('delete_airline', airline_id=airline[0]) }}" class="btn btn-danger btn-sm">Delete</a>
  </td>
</tr>
{% else %}
<tr>
  <td colspan="6">❌ No airlines found</td>
</tr>
{% endfor %}
