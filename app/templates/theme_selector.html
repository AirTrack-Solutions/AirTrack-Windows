<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Theme</title>

  <script>
    (function () {
      try {
        var t = localStorage.getItem('airtrack-theme') || 'default';
        document.documentElement.classList.add('theme-' + t);
        // if body isn't there yet, DOMContentLoaded will add it
        document.addEventListener('DOMContentLoaded', function () {
          document.body && document.body.classList.add('theme-' + t);
        });
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v={{ time() }}">

  <style>
    body {
      background-color: #111;
      color: #fff;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .theme-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .theme-option {
      background: #222;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      width: 200px;
      transition: transform 0.2s;
    }

    .theme-option:hover {
      transform: scale(1.05);
      border-color: #888;
    }

    .theme-option img {
      max-width: 100%;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .theme-name {
      font-size: 1.1em;
      font-weight: bold;
    }
  </style>
</head>
<body class="theme-{{ selected_theme }}">
  <div class="background"></div>
  <h2>Select a Cockpit Theme</h2>
  <div class="theme-grid">
    {% for theme in themes %}
      <div class="theme-option" data-theme="{{ theme.value }}">
        <img src="{{ theme.thumb_url }}" alt="{{ theme.name }}">
        <div class="theme-name">{{ theme.name }}</div>
      </div>
    {% endfor %}
  </div>
  <script>
    document.querySelectorAll(".theme-option").forEach(option => {
      option.addEventListener("click", () => {
        const theme = option.dataset.theme;
        localStorage.setItem("airtrack-theme", theme);
        window.top.location.href = "/admin";  // return to cockpit
      });
    });
  </script>
</body>
</html>
