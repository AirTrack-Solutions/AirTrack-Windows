{% if filtered_airlines %}
  {% for airline in filtered_airlines %}
    <tr>
      <td>{{ airline.AirlineName }}</td>
      <td>{{ airline.TotalAircraft or 0 }}</td>
      <td>
        <a href="{{ url_for('airlines.airline_info', airline_id=airline.AirlineID) }}" class="btn btn-info btn-sm">Info</a>
        <a href="{{ url_for('add_aircraft.add_aircraft', airline_id=airline.AirlineID) }}" class="btn btn-primary btn-sm">Add</a>
        <a href="{{ url_for('edit_airline', airline_id=airline.AirlineID) }}" class="btn btn-warning btn-sm">Edit</a>
        <form action="{{ url_for('delete_airline', airline_id=airline.AirlineID) }}" method="POST" style="display:inline;">
          <button type="submit" class="btn btn-danger btn-sm" onclick="return confirmDelete();">Delete</button>
        </form>
      </td>
    </tr>
  {% endfor %}
{% else %}
  <tr>
    <td colspan="3" class="text-center">⚠️ No airlines found.</td>
  </tr>
{% endif %}
