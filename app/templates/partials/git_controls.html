{% if show_commit_push %}
<input id="commitMsg" class="form-control" placeholder="Commit message" style="margin:8px 0;">
<div class="btn-row" style="margin-bottom:8px;">
  <button class="cockpit-hud-button" type="button" onclick="gitCommit()">Commit</button>
  <button class="cockpit-hud-button" type="button" onclick="gitPush()">Push</button>
</div>
{% endif %}

<script>
(function(){
  const API = (window.AIRTRACK || {});
  const ok  = m => (window.showCockpitConfirmation ? showCockpitConfirmation(m) : alert(m));
  const err = m => (window.showCockpitConfirmation ? showCockpitConfirmation("❌ " + m) : alert("❌ " + m));

  window.gitCommit = async function(){
    const el = document.getElementById('commitMsg');
    const msg = (el && el.value || '').trim();
    if (!msg) { err("Commit message required"); return; }
    try {
      const r = await fetch(API.git_commit || '/admin_tools/git_commit', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message: msg})
      });
      const j = await r.json();
      if (r.ok) { ok(j.detail || "Committed."); el.value = ''; }
      else { err(j.detail || "Commit failed"); }
    } catch(e){ err("Commit failed"); }
  };

  window.gitPush = async function(){
    try {
      const r = await fetch(API.git_push || '/admin_tools/git_push', {method:'POST'});
      const j = await r.json();
      r.ok ? ok(j.detail || "Pushed.") : err(j.detail || "Push failed");
    } catch(e){ err("Push failed"); }
  };

})();
</script>
