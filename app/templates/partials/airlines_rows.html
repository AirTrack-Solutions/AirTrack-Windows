{# templates/partials/airlines_rows.html #}
{% if airlines %}
    {% for airline in airlines %}
    <tr>
        <td>{{ airline.AirlineName }}</td>
        <td>{{ airline.TotalAircraft }}</td>
        <td>
            <a href="{{ url_for('airlines.airline_info', airline_id=airline.AirlineID) }}" class="btn btn-primary btn-sm">Info</a>
            <a href="{{ url_for('add_aircraft.add_aircraft', airline_id=airline.AirlineID) }}" class="btn btn-primary">Add</a>
            <a href="{{ url_for('edit_airline', airline_id=airline.AirlineID) }}" class="btn btn-warning btn-sm">Edit</a>
            <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal{{ airline.AirlineID }}">
                Delete
            </button>
        </td>
    </tr>
    {% endfor %}
{% else %}
    <tr>
      <td colspan="3" class="text-center" style="padding: 15px 0;
font-size: 0.8rem;">
        ⚠️ No airlines found.
      </td>
    </tr>
{% endif %}
